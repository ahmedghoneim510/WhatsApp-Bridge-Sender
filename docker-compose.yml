version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: whatsapp-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-whatsapp_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-whatsapp_bridge}
      MYSQL_USER: ${DB_USER:-whatsapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-whatsapp_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-bridge:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PORT=3000
      - SESSION_DIR=/app/data/sessions
      - LOG_LEVEL=info
      - IDEMPOTENCY_TTL_MS=600000
      - MESSAGE_STORE_TTL_MS=3600000
      - DB_ENABLED=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-whatsapp}
      - DB_PASSWORD=${DB_PASSWORD:-whatsapp_pass}
      - DB_NAME=${DB_NAME:-whatsapp_bridge}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      whatsapp-bridge:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

volumes:
  mysql_data:
    driver: local